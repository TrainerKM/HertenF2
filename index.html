<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamPunkt - Live Tracker</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #1abc9c;
            --bg: #f4f6f9;
            --text: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 60px;
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .tab-content {
            display: none;
            max-width: 600px;
            margin: 20px auto;
            padding: 15px;
        }
        .tab-content.active {
            display: block;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .card h3 { margin-top: 0; color: var(--primary); }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background-color: #eaeded; color: var(--primary); }
        
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge.green { background: #d4edda; color: #155724; }
        .badge.red { background: #f8d7da; color: #721c24; }
        
        /* Yükleniyor Yazısı */
        .loading { text-align: center; color: #7f8c8d; padding: 20px; }

        nav.bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #ddd;
        }
        nav.bottom-nav button {
            background: none; border: none; padding: 15px; width: 100%;
            color: #7f8c8d; font-size: 14px; font-weight: 500; cursor: pointer;
        }
        nav.bottom-nav button.active {
            color: var(--secondary); font-weight: bold; border-top: 3px solid var(--secondary);
        }
    </style>
</head>
<body>

<header>TeamPunkt U8 (Live)</header>

<!-- SEKME 1: STARTSEITE -->
<div id="startseite" class="tab-content active">
    <div class="card">
        <h3>Willkommen</h3>
        <p>Diese Liste wird automatisch aus Google Sheets aktualisiert.</p>
    </div>
</div>

<!-- SEKME 2: SPIELER (CANLI TABLO) -->
<div id="spieler" class="tab-content">
    <h2>Spielerliste</h2>
    <div class="card" style="padding: 0;">
        <div id="loading-text" class="loading">Spieler werden geladen...</div>
        <table id="spieler-table" style="display: none;">
            <thead>
                <tr>
                    <th>Spielername</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="spieler-liste">
                <!-- Veriler buraya otomatik gelecek -->
            </tbody>
        </table>
    </div>
</div>

<!-- Alt Menü -->
<nav class="bottom-nav">
    <button onclick="switchTab('startseite')" id="btn-startseite" class="active">Startseite</button>
    <button onclick="switchTab('spieler')" id="btn-spieler">Spieler</button>
</nav>

<script>
    // Sekme Değiştirme Fonksiyonu
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    }

    // Google Etablodan Veri Çekme Motoru
    // DIKKAT: Aşağıdaki tırnak içine kendi Google Tablo ID'nizi yapıştırın!
    const SHEET_ID = '1cA2WaF01NdSRpYulPW2V3eJ9loG5lv79PssAGLcoUUY'; 
    const SHEET_TITLE = 'Sayfa1'; // Tablonuzun alt sekme adı Almanca ise 'Tabellenblatt1' yapın
    const FULL_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_TITLE}`;

    fetch(FULL_URL)
        .then(res => res.text())
        .then(rep => {
            // Google'ın gönderdiği ham veriyi temizleme
            const data = JSON.parse(rep.substr(47).slice(0, -2));
            const rows = data.table.rows;
            const tbody = document.getElementById('spieler-liste');
            
            // Satırları tek tek tabloya ekleme (İlk satırı başlık sayıp 1. indeksten başlıyoruz)
            for (let i = 0; i < rows.length; i++) {
                const name = rows[i].c[0] ? rows[i].c[0].v : '';
                const status = rows[i].c[1] ? rows[i].c[1].v : 'Aktiv';
                
                let badgeClass = status.toLowerCase() === 'aktiv' ? 'green' : 'red';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${name}</td>
                    <td><span class="badge ${badgeClass}">${status}</span></td>
                `;
                tbody.appendChild(tr);
            }
            
            // Yükleniyor yazısını gizle, tabloyu göster
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('spieler-table').style.display = 'table';
        })
        .catch(err => {
            document.getElementById('loading-text').innerText = 'Fehler beim Laden der Daten.';
            console.error(err);
        });
</script>

</body>
</html>
